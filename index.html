<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>yusuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">yusuo</p>
      <div class="page-head">
        <div>
      <h1>yusuo</h1>
      <p class="hero-copy">
        支持关键词搜索和纯前端语义搜索。语义模式使用 <code>Xenova/bge-small-zh-v1.5</code>，
        并读取搜索专用索引文件做相似度检索。
      </p>
        </div>
        <a class="text-link" href="./embedding.html">前往 Embedding 页面</a>
      </div>

      <div class="search-panel">
        <div class="mode-switch" role="tablist" aria-label="搜索模式">
          <button id="keywordModeButton" class="mode-button is-active" type="button">关键词</button>
          <button id="semanticModeButton" class="mode-button" type="button">语义</button>
        </div>

        <label class="search-label" for="searchInput">搜索词典</label>
        <div class="search-row">
          <input id="searchInput" type="search" placeholder="输入词条、拼音或语义相关描述，例如：阿 / aerfa / ^阿 / ^zuo.*si / (?=.*会)(?=.*人) / 治疗肿瘤的射线" autocomplete="off">
          <button id="searchButton" type="button">搜索</button>
          <button id="clearButton" type="button" class="ghost-button">清空</button>
        </div>

        <div class="semantic-panel pinyin-helper-panel">
          <div class="semantic-copy">
            <strong>常用拼音字符</strong>
            <p>方便直接复制：āáǎà ōóǒò ēéěè īíǐì ūúǔù ü ǖǘǚǜ ê ńňǹ</p>
          </div>
          <div class="generator-actions">
            <button id="copyPinyinCharsButton" type="button" class="ghost-button">复制常用字符</button>
          </div>
        </div>

        <div class="semantic-panel">
          <div class="semantic-copy">
            <strong>语义搜索</strong>
            <p id="semanticStatus">正在检查搜索索引中的 embedding 数据。</p>
          </div>
        </div>

        <div class="toolbar">
          <span id="statusText">正在准备数据…</span>
          <label class="limit-picker" for="limitSelect">
            <span>每页显示</span>
            <select id="limitSelect">
              <option value="20">20</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
            </select>
          </label>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <span id="progressText">0%</span>
        </div>
      </div>
    </section>

    <section class="results-panel">
      <div class="results-head">
        <h2>结果</h2>
        <p id="resultMeta">等待加载…</p>
      </div>
      <div id="results" class="results"></div>
      <div class="pagination">
        <button id="prevButton" type="button">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextButton" type="button">下一页</button>
      </div>
    </section>
  </main>

  <template id="resultTemplate">
    <article class="card">
      <div class="card-top">
        <div>
          <h3 class="headword"></h3>
          <div class="pinyin-group">
            <span class="pinyin-tone"></span>
            <span class="pinyin-plain"></span>
          </div>
        </div>
        <span class="score-badge"></span>
      </div>
      <p class="definition"></p>
    </article>
  </template>

  <script src="./assets/app.js?v=20260331-9"></script>
</body>
</html>
